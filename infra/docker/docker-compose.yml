# SentinelOps local stack. Run from repo root: `make up`.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sentinel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-devpassword}
      POSTGRES_DB: ${POSTGRES_DB:-sentinelops}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-sentinel} -d $${POSTGRES_DB:-sentinelops}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "6379:6379"

  # host.docker.internal → host gateway (Linux: Docker 20.10+; Windows/mac: built-in) so
  # SENTINELOPS_LLM_BASE_URL can reach Ollama on the host, not 127.0.0.1 inside the container.
  # See docs/LOCAL_LLM.md §4.
  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - ../../ml/artifacts:/app/ml/artifacts:ro
      - vault_data:/var/lib/sentinelops/vault
    ports:
      - "8000:8000"
    command:
      [
        "sh",
        "-c",
        "alembic upgrade head || (python -c 'import asyncio; from app.core.db import init_db; asyncio.run(init_db())' && alembic stamp head); uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
      ]

  worker:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_started
      redis:
        condition: service_healthy
    volumes:
      - ../../backend:/app
      - ../../ml/artifacts:/app/ml/artifacts:ro
    # ``-B`` runs the beat scheduler embedded in this worker so the
    # ``recon-rescue-orphans`` schedule (and any future periodic tasks) fires
    # without needing a separate beat container in dev. ``-s /tmp/...``
    # directs the schedule state file to a writable location inside the
    # container so it can be created on each restart.
    command:
      [
        "celery", "-A", "app.workers.celery_app",
        "worker", "--loglevel=info", "--concurrency=4",
        "-Q", "recon,siem,ids,celery",
        "-B", "-s", "/tmp/celerybeat-schedule"
      ]
    # Override the backend image's HTTP healthcheck — workers don't expose HTTP.
    # `celery inspect ping` round-trips through the broker and only succeeds when
    # the worker is actually consuming.
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.workers.celery_app inspect ping -d celery@$$(hostname) >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # UI: browser → localhost:3000. Next in the container must listen on 0.0.0.0
  # (see frontend package.json "dev" / "start" -H 0.0.0.0) or the host cannot connect.
  frontend:
    build:
      context: ../../frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ../../.env
    # Inside the Docker network the Next.js server proxies /api/v1/* via this
    # internal target; the browser still uses NEXT_PUBLIC_API_URL/_WS_URL from
    # `.env` to reach the backend through the host's published ports.
    environment:
      INTERNAL_API_URL: http://backend:8000
    depends_on:
      - backend
    volumes:
      - ../../frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "3000:3000"
    command: ["pnpm", "dev"]

volumes:
  db_data:
  redis_data:
  vault_data:
